name: Build K-Frame Quartz Bridge

on:
  push:
    branches: [ main ]
    paths:
      - 'k-frame-quartz-bridge/**'
      - '.github/workflows/build-k-frame-quartz-bridge.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'k-frame-quartz-bridge/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./k-frame-quartz-bridge
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update VERSION file
        working-directory: ./k-frame-quartz-bridge
        run: |
          echo "1.0.${{ github.run_number }}" | Out-File -FilePath VERSION -Encoding utf8 -NoNewline

      - name: Build executable with PyInstaller
        working-directory: ./k-frame-quartz-bridge
        run: |
          pyinstaller k-frame-quartz-bridge.spec

      - name: Test executable exists
        working-directory: ./k-frame-quartz-bridge
        run: |
          if (Test-Path "dist/k-frame-quartz-bridge.exe") {
            Write-Host "Executable built successfully"
            Get-Item "dist/k-frame-quartz-bridge.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Error "Executable not found!"
            exit 1
          }

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: k-frame-quartz-bridge-windows
          path: k-frame-quartz-bridge/dist/k-frame-quartz-bridge.exe
          retention-days: 90

      - name: Create Versioned Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: k-frame-quartz-bridge-v1.0.${{ github.run_number }}
          name: K-Frame Quartz Bridge v1.0.${{ github.run_number }}
          body: |
            Automated build of K-Frame Quartz Bridge for Windows

            ## Download
            - Download `k-frame-quartz-bridge.exe` below
            - Double-click to run (no installation needed)
            - Access the status UI at http://localhost:4001

            Built from commit: ${{ github.sha }}
          files: |
            k-frame-quartz-bridge/dist/k-frame-quartz-bridge.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: k-frame-quartz-bridge-latest
          name: K-Frame Quartz Bridge - Latest Build
          body: |
            **Latest stable build of K-Frame Quartz Bridge**

            This release is automatically updated with every commit to main.

            ## Download
            Click the asset below to download the latest version.

            ## Usage
            1. Download `k-frame-quartz-bridge.exe`
            2. Double-click to run
            3. Configure GV host and suite in Settings
            4. Access the status UI at http://localhost:4001

            ---
            *Built from commit: ${{ github.sha }}*
            *Version: v1.0.${{ github.run_number }}*
          files: |
            k-frame-quartz-bridge/dist/k-frame-quartz-bridge.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
