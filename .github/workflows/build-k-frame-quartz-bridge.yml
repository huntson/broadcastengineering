name: Build K-Frame Quartz Bridge

# Tag-driven: release.sh creates and pushes k-frame-quartz-bridge/vX.Y.Z,
# this workflow then builds the EXE and attaches it to that release.
# See VERSIONING.md for the protocol.

on:
  push:
    tags:
      - 'k-frame-quartz-bridge/v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./k-frame-quartz-bridge
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read VERSION from git
        id: version
        working-directory: ./k-frame-quartz-bridge
        shell: bash
        run: |
          version=$(tr -d '[:space:]' < VERSION)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Sanity check tag matches VERSION
        shell: bash
        run: |
          tag_ref="${{ github.ref_name }}"
          expected="k-frame-quartz-bridge/v${{ steps.version.outputs.version }}"
          if [ "$tag_ref" != "$expected" ]; then
            echo "tag ($tag_ref) does not match VERSION ($expected)" >&2
            exit 1
          fi

      - name: Build executable with PyInstaller
        working-directory: ./k-frame-quartz-bridge
        run: |
          pyinstaller k-frame-quartz-bridge.spec

      - name: Test executable exists
        working-directory: ./k-frame-quartz-bridge
        run: |
          if (Test-Path "dist/k-frame-quartz-bridge.exe") {
            Write-Host "Executable built successfully"
            Get-Item "dist/k-frame-quartz-bridge.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Error "Executable not found!"
            exit 1
          }

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: k-frame-quartz-bridge-windows
          path: k-frame-quartz-bridge/dist/k-frame-quartz-bridge.exe
          retention-days: 90

      - name: Attach EXE to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: K-Frame Quartz Bridge v${{ steps.version.outputs.version }}
          body: |
            Automated Windows build of K-Frame Quartz Bridge.

            ## Download
            - Download `k-frame-quartz-bridge.exe` below.
            - Double-click to run (no installation needed).
            - Access the status UI at http://localhost:4001.

            Built from commit: ${{ github.sha }}
          files: |
            k-frame-quartz-bridge/dist/k-frame-quartz-bridge.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
